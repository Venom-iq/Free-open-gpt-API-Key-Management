<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>open-gpt — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; padding: 40px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #f0f0f0; cursor: pointer; border-radius: 5px; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; transition: border 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #764ba2; }
        .error { color: #e74c3c; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 open-gpt</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('admin')">Admin</button>
            <button class="tab-btn" onclick="switchTab('user')">User</button>
        </div>
        
        <div id="admin" class="tab-content active">
            <form onsubmit="loginAdmin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="admin-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit">Login as Admin</button>
                <div id="admin-error" class="error"></div>
            </form>
        </div>
        
        <div id="user" class="tab-content">
            <form onsubmit="loginUser(event)">
                <div class="form-group">
                    <label>API Key</label>
                    <input type="text" id="user-key" placeholder="ogpt-..." required>
                </div>
                <button type="submit">Login as User</button>
                <div id="user-error" class="error"></div>
            </form>
        </div>
    </div>
    
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function loginAdmin(e) {
            e.preventDefault();
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;
            const errorDiv = document.getElementById('admin-error');
            
            errorDiv.textContent = '';
            
            try {
                const res = await fetch('/auth/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    document.cookie = `session=${data.token}; path=/; max-age=86400`;
                    window.location.href = '/admin';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    console.error('Login error:', data);
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error: ' + err.message;
                console.error('Login exception:', err);
            }
        }
        
        async function loginUser(e) {
            e.preventDefault();
            const api_key = document.getElementById('user-key').value;
            const errorDiv = document.getElementById('user-error');
            
            errorDiv.textContent = '';
            
            try {
                const res = await fetch('/auth/user/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({api_key})
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    document.cookie = `session=${data.token}; path=/; max-age=604800`;
                    window.location.href = '/user';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    console.error('Login error:', data);
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error: ' + err.message;
                console.error('Login exception:', err);
            }
        }
    </script>
</body>
</html>
