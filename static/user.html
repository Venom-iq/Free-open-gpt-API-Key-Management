<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Portal — open-gpt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card h2 { margin-bottom: 20px; color: #333; }
        .key-display { background: #f9f9f9; padding: 15px; border-radius: 5px; font-family: monospace; word-break: break-all; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .copy-btn:hover { background: #764ba2; }
        .stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .stat-label { color: #666; }
        .stat-value { font-weight: bold; color: #333; }
        .progress-bar { width: 100%; height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
        .logout { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔑 My API Key</h1>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>Your API Key</h2>
            <div class="key-display">
                <span id="api-key">Loading...</span>
                <button class="copy-btn" onclick="copyKey()">Copy</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Usage Statistics</h2>
            <div class="stat">
                <span class="stat-label">Tokens Used</span>
                <span class="stat-value" id="tokens-used">0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 0%"></div>
            </div>
            <div class="stat">
                <span class="stat-label">Token Limit</span>
                <span class="stat-value" id="token-limit">Unlimited</span>
            </div>
            <div class="stat">
                <span class="stat-label">Requests Made</span>
                <span class="stat-value" id="requests">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Created</span>
                <span class="stat-value" id="created">-</span>
            </div>
            <div class="stat">
                <span class="stat-label">Last Used</span>
                <span class="stat-value" id="last-used">Never</span>
            </div>
        </div>
    </div>
    
    <script>
        async function loadUserInfo() {
            try {
                const res = await fetch('/key/info', {
                    headers: {'Authorization': 'Bearer ' + getCookie('session')}
                });
                if (!res.ok) window.location.href = '/';
                const info = await res.json();
                
                document.getElementById('api-key').textContent = getCookie('session');
                document.getElementById('tokens-used').textContent = info.tokens_used;
                document.getElementById('token-limit').textContent = info.token_limit;
                document.getElementById('requests').textContent = info.requests_count;
                document.getElementById('created').textContent = new Date(info.created_at).toLocaleDateString();
                document.getElementById('last-used').textContent = info.last_used ? new Date(info.last_used).toLocaleDateString() : 'Never';
                
                if (info.token_limit !== 'unlimited') {
                    const percent = (info.tokens_used / info.token_limit) * 100;
                    document.getElementById('progress').style.width = Math.min(percent, 100) + '%';
                }
            } catch (err) {
                console.error(err);
            }
        }
        
        function copyKey() {
            const key = getCookie('session');
            navigator.clipboard.writeText(key);
            alert('API Key copied to clipboard!');
        }
        
        function getCookie(name) {
            return document.cookie.split('; ').find(row => row.startsWith(name + '='))?.split('=')[1];
        }
        
        function logout() {
            fetch('/auth/logout', {method: 'POST', headers: {'Authorization': 'Bearer ' + getCookie('session')}});
            document.cookie = 'session=; path=/';
            window.location.href = '/';
        }
        
        loadUserInfo();
    </script>
</body>
</html>
